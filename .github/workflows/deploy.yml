name: Deploy Frontend to cPanel via FTP

on:
  push:
    branches:
      - main   # change if needed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Install dependencies
      - name: Install dependencies
        run: |
          cd frontend
          npm install

      # Inject environment variables (production)
      - name: Create .env.production
        run: |
          cd frontend
          echo "VITE_API_URL=${{ secrets.API_URL }}" > .env.production
          echo "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> .env.production

      # Build frontend
      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # Deploy via FTP (clean slate)
      - name: Upload to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: frontend/dist/
          server-dir: /
          dangerous-clean-slate: true